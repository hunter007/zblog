baseURL = 'https://example.org/'
locale = 'zh_Hans'
title = 'My New Hugo Project'
theme =  ['hugo-flex', 'hugo-theme-yue', 'black-and-light']
pygmentsstyle       = "bw"
pygmentscodefences  = true

defaultContentLanguage = 'zh_Hans'
defaultContentLanguageInSubdir = false
disableDefaultLanguageRedirect = false
disableLanguages = []
hasCJKLanguage = true


[languages]
  [languages.zh_Hans]
    direction = ''
    disabled = false
    label = '简体中文'
    locale = 'zh_Hans'
    title = ''
    weight = 1

  [languages.ja]
    direction = ''
    disabled = false
    label = '日本語'
    locale = 'ja'
    title = ''
    weight = 0


[params]
  sitename = "Black & Light"
  disableWebFonts = false
  #noClasses: 'false'
  [author]
    name = "hunter007"
    email = "wentao79@gmail.com"
    link = "https://github.com/hunter007"

[menus]
[[menus.main]]
    name = "文章"
    pageRef  = "/posts"
    identifier = 'posts'
    weight = 10
[[menus.main]]
    name = "golang标准库"
    pageRef  = "/posts/gopkg"
    identifier = 'posts/gopkg'
    parent = 'posts'
    weight = 1

[[menus.main]]
    name = "标签"
    identifier = 'tags'
    pageRef  = "/tags"
    weight = 40
[[menus.main]]
    name = "分类"
    identifier = 'categories'
    pageRef  = "/categories"
    weight = 50
[[menus.main]]
    name = "关于"
    pageRef = '/about'
    identifier = 'about'
    weight = 30





[markup]
  [markup.hightlight]
    #noClasses = 'false'
    linenos = 'inline'
    style = 'monokai'
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true

[services]
  [services.googleAnalytics]
    id = 'G-MEASUREMENT_ID'

[privacy]
  [privacy.googleAnalytics]
    disable = false
    respectDoNotTrack = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[module]
  [[module.imports]]
    path = 'github.com/davidhampgonsalves/hugo-black-and-light-theme'
  [[module.imports]]
    path = 'github.com/CyrusYip/hugo-theme-yue'
  [[module.imports]]
    path = 'github.com/ldeso/hugo-flex'
